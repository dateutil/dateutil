name: Validate

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  pypi-hosts: "pypi.python.org pypi.org files.pythonhosted.org"
  TZDATA_VERSION: "2024a"

jobs:
  build-tzdata:
    runs-on: ubuntu-latest
    steps:
      - name: Cache tzdata
        id: cache-tzdata
        uses: actions/cache@v4
        with:
          path: tzdata_built
          key: tzdata-${{ env.TZDATA_VERSION }}

      - name: Build tzdata
        if: steps.cache-tzdata.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y lzip curl
          mkdir -p tzdata_built
          TMP_DIR=$(mktemp -d)
          cd $TMP_DIR
          curl --fail --location "https://data.iana.org/time-zones/releases/tzdb-${{ env.TZDATA_VERSION }}.tar.lz" -o tzdb.tar.lz
          tar --lzip -xf tzdb.tar.lz
          cd tzdb-${{ env.TZDATA_VERSION }}
          make install DESTDIR=$GITHUB_WORKSPACE/tzdata_built \
                        DATAFORM=main

      - name: Upload tzdata artifact
        uses: actions/upload-artifact@v4
        with:
          name: tzdata
          path: tzdata_built/usr/share/zoneinfo

  test:
    strategy:
      matrix:
        python-version: [
          "3.8",
          "3.9",
          "3.10",
          "3.11",
          "3.12",
          "3.13",
          "pypy-2.7",
          "pypy-3.8",
        ]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          # Older versions (<=3.7) are included separately since they need
          # special handling (using an older os or a container)
          - os: "macos-15-intel"
            python-version: "3.5"
          - os: "macos-15-intel"
            python-version: "3.6"
          - os: "macos-15-intel"
            python-version: "3.7"
          - os: "windows-latest"
            python-version: "3.5"
          - os: "windows-latest"
            python-version: "3.6"
          - os: "windows-latest"
            python-version: "3.7"
          - os: "ubuntu-latest"
            python-version: "2.7"
            use-container: true
          - os: "ubuntu-latest"
            python-version: "3.5"
            use-container: true
          - os: "ubuntu-latest"
            python-version: "3.6"
            use-container: true
          - os: "ubuntu-latest"
            python-version: "3.7"
            use-container: true
    runs-on: ${{ matrix.os }}
    needs: build-tzdata
    container:
      image: ${{ matrix.use-container && format('python:{0}', matrix.python-version) || '' }}
    env:
      TOXENV: py
      PIP_TRUSTED_HOST: pypi.python.org
      SUDO: ${{ !matrix.use-container && 'sudo' || '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - if: ${{ !matrix.use-container }}
        name: Set up Python ${{ matrix.python-version }} on ${{ matrix.os }} (non-containers)
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
        env:
          PIP_TRUSTED_HOST: ${{ contains(fromJson('["2.7", "3.5", "3.6", "3.7"]'), matrix.python-version) && env.pypi-hosts || '' }}
      - name: Download tzdata artifact
        uses: actions/download-artifact@v4
        if: startsWith(matrix.os, 'ubuntu')
        with:
          name: tzdata
          path: tzdata_download
      - name: Install specific tzdata version
        run: |
          $SUDO rm -rf /usr/share/zoneinfo
          $SUDO mv tzdata_download /usr/share/zoneinfo

          cat /usr/share/zoneinfo/tzdata.zi | head -n 1
        if: startsWith(matrix.os, 'ubuntu')
      - name: Install dependencies
        run: python -m pip install -U tox
      - name: Run tox
        run: python -m tox
      - name: Generate coverage.xml
        run: python -m tox -e coverage
      - name: Report coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./.tox/coverage.xml
          name: ${{ matrix.os }}:${{ matrix.python-version }}
          fail_ci_if_error: false
          # codecov/codecov-action@v3 needs v0.7.3 to work on macos-15-intel
          # See https://github.com/codecov/codecov-action/issues/1549
          version: ${{ endsWith(matrix.os, '-intel') && 'v0.7.3' || 'latest' }}

  other:
    runs-on: "ubuntu-latest"
    needs: build-tzdata
    strategy:
      matrix:
        toxenv: ["docs", "tz", "precommit"]
    env:
      TOXENV: ${{ matrix.toxenv }}

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: ${{ matrix.toxenv }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Download tzdata artifact
        uses: actions/download-artifact@v4
        with:
          name: tzdata
          path: tzdata_download
      - name: Install specific tzdata version
        run: |
          sudo rm -rf /usr/share/zoneinfo
          sudo mv tzdata_download /usr/share/zoneinfo

          cat /usr/share/zoneinfo/tzdata.zi | head -n 1
      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          python -m pip install -U tox
      - name: Run action
        run: tox

  darker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
      - uses: akaihola/darker@0fb2501a3f6c1b2d64976afa57885aeec0601182
        # pinned due to unreleased fix: https://github.com/akaihola/darker/issues/489
        with:
          options: "--check --diff --color --isort"
          src: "."
          version: "1.7.2"

  build-dist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install tox
        run: python -m pip install -U tox
      - name: Run tox
        run: python -m tox -e build
      - name: Check generation
        run: |
          exactly_one() {
            value=$(find dist -iname $1 | wc -l)
            if [ $value -ne 1 ]; then
              echo "Found $value instances of $1, not 1"
              return 1
            else
              echo "Found exactly 1 instance of $value"
            fi
          }
          # Check that exactly one tarball and one wheel are created
          exactly_one '*.tar.gz'
          exactly_one '*.whl'
